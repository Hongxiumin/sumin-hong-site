<!DOCTYPE html>
<html lang="en" id="html-root">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sumin Hong · Educational Technology Researcher</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Serif:ital,wght@0,400;0,500;0,600;1,400&family=IBM+Plex+Sans:wght@400;500;600&family=IBM+Plex+Sans+KR:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#170B2E; --ink-soft:#241442; --paper:#F3EEFB; --paper-2:#E9DFF5; --card:#FAF7FE;
    --slate:#5B4B78; --slate-light:#8C7BA8; --violet:#8B5CF6; --violet-soft:#C4B5FD;
    --cyan:#22D3EE; --magenta:#D946EF; --line:#DDD2EF; --line-dark:#3B2564;
  }
  *{box-sizing:border-box;}
  html{scroll-behavior:smooth;}
  body{margin:0;background:var(--paper);color:var(--ink);font-family:'IBM Plex Sans','IBM Plex Sans KR',sans-serif;line-height:1.6;-webkit-font-smoothing:antialiased;}
  ::selection{background:var(--violet-soft);color:var(--ink);}
  a{color:inherit;}
  .mono{font-family:'IBM Plex Mono',monospace;}
  .wrap{max-width:1080px;margin:0 auto;padding:0 32px;}
  @media (max-width:640px){.wrap{padding:0 20px;}}
  .eyebrow{font-family:'IBM Plex Mono',monospace;font-size:12px;letter-spacing:.14em;text-transform:uppercase;color:var(--violet-soft);}

  header.hero{
    background:radial-gradient(900px 480px at 88% -10%, rgba(139,92,246,0.35), transparent 60%),
      radial-gradient(700px 420px at 8% 105%, rgba(34,211,238,0.16), transparent 65%),
      linear-gradient(180deg, var(--ink) 0%, var(--ink-soft) 100%);
    color:#EDE9F7;padding:26px 0 64px;border-bottom:1px solid var(--line-dark);position:relative;overflow:hidden;
  }
  header.hero::after{
    content:"";position:absolute;inset:0;
    background-image:repeating-linear-gradient(90deg, rgba(196,181,253,0.06) 0 1px, transparent 1px 120px),
      repeating-linear-gradient(0deg, rgba(196,181,253,0.05) 0 1px, transparent 1px 120px);
    mask-image:linear-gradient(180deg, transparent, rgba(0,0,0,.9) 30%, transparent 92%);
    pointer-events:none;
  }
  .portal{position:absolute;top:-160px;right:-120px;width:420px;height:420px;border-radius:50%;
    background:radial-gradient(circle, rgba(139,92,246,.55), rgba(34,211,238,.18) 55%, transparent 72%);
    filter:blur(6px);animation:pulse 7s ease-in-out infinite;pointer-events:none;}
  @keyframes pulse{0%,100%{opacity:.75;transform:scale(1);}50%{opacity:1;transform:scale(1.06);}}
  @media (prefers-reduced-motion: reduce){ .portal{animation:none;} }

  .hero-top{display:flex;justify-content:space-between;align-items:flex-start;gap:24px;flex-wrap:wrap;padding-top:34px;position:relative;z-index:1;}
  nav.tabs{display:flex;gap:20px;flex-wrap:wrap;align-items:center;}
  nav.tabs a{font-family:'IBM Plex Mono',monospace;font-size:12.5px;letter-spacing:.04em;color:#B9AEDD;text-decoration:none;border-bottom:1px solid transparent;padding-bottom:2px;transition:color .15s, border-color .15s;}
  nav.tabs a:hover{color:#fff;border-color:var(--cyan);}
  #lang-toggle{font-family:'IBM Plex Mono',monospace;font-size:11.5px;letter-spacing:.04em;color:var(--ink);background:var(--violet-soft);border:1px solid transparent;border-radius:20px;padding:6px 14px;cursor:pointer;transition:all .15s;}
  #lang-toggle:hover{background:#fff;}

  /* Hero body layout with optional profile image */
  .hero-body{display:flex;gap:36px;align-items:flex-start;flex-wrap:wrap;position:relative;z-index:1;margin-top:34px;}
  .hero-text{flex:1;min-width:260px;}
  .hero-profile{
    width:160px;height:160px;border-radius:50%;overflow:hidden;flex-shrink:0;
    border:2px solid rgba(196,181,253,.35);
    box-shadow:0 12px 40px rgba(139,92,246,.35), 0 0 0 6px rgba(139,92,246,.08);
    background:var(--ink-soft);position:relative;z-index:1;
  }
  .hero-profile img{width:100%;height:100%;object-fit:cover;display:block;}
  @media (max-width:640px){
    .hero-body{gap:24px;}
    .hero-profile{width:120px;height:120px;}
  }

  .hero-name{font-family:'IBM Plex Serif',serif;font-weight:500;font-size:clamp(40px, 6vw, 68px);line-height:1.05;margin:0 0 6px;letter-spacing:-.01em;}
  .hero-name em{font-style:italic;color:var(--cyan);font-weight:400;}
  .hero-kr{font-family:'IBM Plex Sans KR',sans-serif;color:#A79BC9;font-size:15px;margin-bottom:26px;}
  .hero-role{font-size:17px;color:#DCD5F0;max-width:640px;margin-bottom:8px;}
  .hero-role strong{color:#fff;font-weight:600;}
  .hero-sub{color:#A79BC9;font-size:14.5px;max-width:640px;}
  .status-line{margin-top:26px;display:flex;gap:10px;flex-wrap:wrap;align-items:center;}
  .status-chip{font-family:'IBM Plex Mono',monospace;font-size:11.5px;padding:5px 10px;border-radius:3px;border:1px solid rgba(196,181,253,.28);color:#DCD5F0;display:inline-flex;align-items:center;gap:6px;}
  .status-chip .dot{width:6px;height:6px;border-radius:50%;display:inline-block;}
  .status-chip .dot.violet{background:var(--violet-soft);box-shadow:0 0 8px var(--violet-soft);}
  .status-chip .dot.cyan{background:var(--cyan);box-shadow:0 0 8px var(--cyan);}
  .hero-links{margin-top:22px;display:flex;gap:18px;flex-wrap:wrap;}
  .hero-links a{font-size:13px;text-decoration:none;color:#B9AEDD;border-bottom:1px solid rgba(196,181,253,.3);padding-bottom:2px;transition:color .15s,border-color .15s;}
  .hero-links a:hover{color:#fff;border-color:var(--cyan);}

  section{padding:66px 0;}
  section + section{border-top:1px solid var(--line);}
  .sec-head{display:flex;align-items:baseline;gap:16px;margin-bottom:34px;flex-wrap:wrap;}
  .sec-title{font-family:'IBM Plex Serif',serif;font-size:28px;font-weight:500;letter-spacing:-.01em;}
  .sec-note{color:var(--slate-light);font-size:13.5px;}

  .about-grid{display:grid;grid-template-columns:1.3fr .9fr;gap:48px;}
  @media (max-width:800px){.about-grid{grid-template-columns:1fr;}}
  .about-lead{font-size:18px;color:var(--ink-soft);max-width:56ch;}
  .about-lead strong{color:var(--ink);}
  .interest-box{background:var(--card);border:1px solid var(--line);border-radius:6px;padding:22px 24px;margin-top:22px;}
  .interest-box .eyebrow{margin-bottom:10px;display:block;color:var(--violet);}
  .interest-tags{display:flex;flex-wrap:wrap;gap:8px;}
  .interest-tags span{font-size:12.5px;padding:5px 10px;border:1px solid var(--line);border-radius:20px;background:#fff;color:var(--slate);}
  .about-facts{border-left:1px solid var(--line);padding-left:32px;}
  @media (max-width:800px){.about-facts{border-left:none;padding-left:0;border-top:1px solid var(--line);padding-top:28px;}}
  .fact{margin-bottom:20px;}
  .fact .k{font-family:'IBM Plex Mono',monospace;font-size:11px;text-transform:uppercase;letter-spacing:.08em;color:var(--slate-light);}
  .fact .v{font-size:15px;margin-top:3px;}

  .ledger{border-top:1px solid var(--line);}
  .ledger-row{display:grid;grid-template-columns:36px 120px 1fr auto;gap:16px;align-items:start;padding:18px 0;border-bottom:1px solid var(--line);}
  .ledger-row.no-logo{grid-template-columns:120px 1fr auto;}
  @media (max-width:640px){.ledger-row, .ledger-row.no-logo{grid-template-columns:1fr;gap:6px;}}
  .ledger-logo{width:36px;height:36px;border-radius:50%;background:#fff;border:1px solid var(--line);overflow:hidden;display:flex;align-items:center;justify-content:center;}
  .ledger-logo img{width:100%;height:100%;object-fit:contain;padding:3px;}
  @media (max-width:640px){.ledger-logo{width:28px;height:28px;}}
  .ledger-date{font-family:'IBM Plex Mono',monospace;font-size:12px;color:var(--slate-light);padding-top:3px;}
  .ledger-main .title{font-size:15.5px;font-weight:500;color:var(--ink);}
  .ledger-main .org{font-size:13.5px;color:var(--slate);margin-top:2px;}
  .ledger-tags{display:flex;gap:6px;flex-wrap:wrap;align-items:center;}
  .pill{font-family:'IBM Plex Mono',monospace;font-size:10.5px;letter-spacing:.02em;padding:3px 8px;border-radius:3px;white-space:nowrap;}
  .pill.done{background:#EFE8FC;color:#6D28D9;border:1px solid #DACCF5;}
  .pill.progress{background:#FCE7F8;color:#A21CAF;border:1px solid #F3C6EC;}
  .pill.role{background:#EFEBFA;color:var(--slate);border:1px solid var(--line);}
  .filter-bar{display:flex;gap:8px;margin-bottom:6px;flex-wrap:wrap;}
  .filter-btn{font-family:'IBM Plex Mono',monospace;font-size:11.5px;padding:6px 12px;border-radius:20px;border:1px solid var(--line);background:#fff;color:var(--slate);cursor:pointer;transition:all .15s;}
  .filter-btn.active{background:var(--ink);color:#fff;border-color:var(--ink);}
  .ledger-row.hidden{display:none;}

  .pub-list{border-top:1px solid var(--line);}
  .pub{padding:20px 0;border-bottom:1px solid var(--line);display:grid;grid-template-columns:56px 1fr;gap:18px;}
  @media (max-width:640px){.pub{grid-template-columns:1fr;gap:4px;}}
  .pub .yr{font-family:'IBM Plex Mono',monospace;font-size:13px;color:var(--violet);padding-top:2px;}
  .pub .cite{font-size:14.5px;color:var(--ink-soft);}
  .pub .journal{font-style:italic;color:var(--slate);}

  .flagship-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:20px;margin-bottom:40px;}
  @media (max-width:900px){.flagship-grid{grid-template-columns:1fr 1fr;}}
  @media (max-width:640px){.flagship-grid{grid-template-columns:1fr;}}
  .flagship{background:var(--ink);color:#EDE9F7;border-radius:8px;overflow:hidden;position:relative;display:flex;flex-direction:column;}
  .flagship-inner{padding:26px 26px 22px;position:relative;flex:1;}
  .flagship-inner::before{content:"";position:absolute;top:0;right:0;width:130px;height:130px;background:radial-gradient(circle at top right, rgba(139,92,246,.45), transparent 70%);pointer-events:none;}
  .flagship-inner::after{content:"";position:absolute;bottom:-40px;left:-30px;width:110px;height:110px;background:radial-gradient(circle, rgba(34,211,238,.25), transparent 70%);pointer-events:none;}
  .flagship-image{width:100%;aspect-ratio:16/9;overflow:hidden;background:var(--ink-soft);position:relative;}
  .flagship-image img{width:100%;height:100%;object-fit:cover;display:block;}
  .flagship-image::after{content:"";position:absolute;inset:0;background:linear-gradient(180deg, transparent 60%, rgba(23,11,46,.55));pointer-events:none;}
  .flagship .tag{font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--cyan);letter-spacing:.06em;position:relative;z-index:1;}
  .flagship h4{font-family:'IBM Plex Serif',serif;font-size:20px;margin:8px 0 8px;font-weight:500;position:relative;z-index:1;}
  .flagship p{font-size:13.5px;color:#C6BCE3;margin:0 0 14px;position:relative;z-index:1;}
  .flagship a{font-size:12.5px;color:#fff;text-decoration:none;border-bottom:1px solid var(--cyan);position:relative;z-index:1;}

  .teach-grid{display:grid;grid-template-columns:1fr 1fr;gap:40px;}
  @media (max-width:800px){.teach-grid{grid-template-columns:1fr;}}
  .teach-col h4{font-family:'IBM Plex Mono',monospace;font-size:12px;letter-spacing:.08em;text-transform:uppercase;color:var(--slate-light);margin-bottom:16px;}
  .teach-item{padding:12px 0;border-bottom:1px solid var(--line);display:flex;gap:14px;align-items:flex-start;}
  .teach-item.no-thumb{display:block;}
  .teach-thumb{width:72px;height:54px;border-radius:6px;overflow:hidden;flex-shrink:0;background:var(--paper-2);border:1px solid var(--line);}
  .teach-thumb img{width:100%;height:100%;object-fit:cover;display:block;}
  .teach-body{flex:1;min-width:0;}
  .teach-item .t-title{font-size:14.5px;color:var(--ink);font-weight:500;}
  .teach-item .t-meta{font-size:12.5px;color:var(--slate-light);font-family:'IBM Plex Mono',monospace;margin-top:2px;}

  .special-strip{display:grid;grid-template-columns:repeat(auto-fill, minmax(180px, 1fr));gap:12px;margin-top:20px;}
  .special-strip figure{margin:0;background:#fff;border:1px solid var(--line);border-radius:8px;overflow:hidden;}
  .special-strip img{width:100%;aspect-ratio:3/2;object-fit:cover;display:block;}
  .special-strip figcaption{font-size:12px;color:var(--slate);padding:8px 10px;border-top:1px solid var(--line);}

  /* Gallery section */
  .gallery-grid{display:grid;grid-template-columns:repeat(auto-fill, minmax(240px, 1fr));gap:16px;}
  .gallery-item{background:#fff;border:1px solid var(--line);border-radius:10px;overflow:hidden;transition:transform .2s, box-shadow .2s;cursor:pointer;}
  .gallery-item:hover{transform:translateY(-3px);box-shadow:0 10px 24px rgba(139,92,246,.15);}
  .gallery-item img{width:100%;aspect-ratio:4/3;object-fit:cover;display:block;background:var(--paper-2);}
  .gallery-item figcaption{font-size:13px;color:var(--ink-soft);padding:10px 12px;border-top:1px solid var(--line);}

  /* Lightbox */
  .lightbox{
    position:fixed;inset:0;background:rgba(23,11,46,.92);display:none;align-items:center;justify-content:center;
    z-index:200;padding:24px;cursor:zoom-out;
  }
  .lightbox.open{display:flex;}
  .lightbox img{max-width:100%;max-height:90vh;border-radius:8px;box-shadow:0 20px 60px rgba(0,0,0,.6);}
  .lightbox .lb-caption{position:absolute;bottom:24px;left:0;right:0;text-align:center;color:#EDE9F7;font-size:14px;font-family:'IBM Plex Sans KR',sans-serif;padding:0 20px;}
  .lightbox .lb-close{position:absolute;top:20px;right:24px;color:#EDE9F7;font-size:26px;background:none;border:none;cursor:pointer;font-family:'IBM Plex Mono',monospace;}

  footer{background:var(--ink);color:#EDE9F7;padding:64px 0 40px;}
  .contact-grid{display:grid;grid-template-columns:1.2fr 1fr;gap:40px;margin-bottom:48px;}
  @media (max-width:700px){.contact-grid{grid-template-columns:1fr;}}
  footer .sec-title{color:#fff;}
  .contact-lead{font-size:16px;color:#C6BCE3;max-width:44ch;}
  .contact-links{display:flex;flex-direction:column;gap:14px;}
  .contact-links a{display:flex;justify-content:space-between;text-decoration:none;font-size:14px;color:#DCD5F0;border-bottom:1px solid rgba(196,181,253,.16);padding-bottom:10px;}
  .contact-links a span.k{font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--cyan);}
  .foot-bottom{border-top:1px solid rgba(196,181,253,.16);padding-top:22px;display:flex;justify-content:space-between;flex-wrap:wrap;gap:10px;font-size:12px;color:#8C7BA8;}

  .admin-banner{
    display:none; background:var(--violet); color:#fff; font-family:'IBM Plex Mono',monospace; font-size:12.5px;
    text-align:center; padding:8px 12px;
  }
  .admin-banner a{color:#fff; text-decoration:underline;}
</style>
</head>
<body>

<div class="admin-banner" id="local-notice">
  content.json을 불러오지 못해 내장된 기본 콘텐츠로 표시 중입니다 · admin.html에서 편집한 파일을 이 폴더에 넣고 GitHub Pages 등 웹서버로 열어주세요.
</div>

<header class="hero">
  <div class="portal"></div>
  <div class="wrap">
    <div class="hero-top">
      <span class="eyebrow" id="hero-eyebrow"></span>
      <nav class="tabs" id="hero-nav">
        <button id="lang-toggle" type="button">한국어</button>
      </nav>
    </div>
    <div class="hero-body">
      <div class="hero-text">
        <h1 class="hero-name">Sumin <em>Hong</em></h1>
        <div class="hero-kr">홍수민 · Dr. Hong</div>
        <p class="hero-role" id="hero-role"></p>
        <p class="hero-sub" id="hero-sub"></p>
        <div class="status-line" id="hero-status"></div>
        <div class="hero-links" id="hero-links"></div>
      </div>
      <div class="hero-profile" id="hero-profile" style="display:none;">
        <img id="hero-profile-img" alt="Sumin Hong">
      </div>
    </div>
  </div>
</header>

<section id="about">
  <div class="wrap">
    <div class="sec-head"><span class="sec-title" id="about-title"></span></div>
    <div class="about-grid">
      <div>
        <p class="about-lead" id="about-lead1"></p>
        <p class="about-lead" style="margin-top:16px;" id="about-lead2"></p>
        <div class="interest-box">
          <span class="eyebrow" id="about-interests-label"></span>
          <div class="interest-tags" id="about-interests"></div>
        </div>
      </div>
      <div class="about-facts" id="about-facts"></div>
    </div>
  </div>
</section>

<section id="career">
  <div class="wrap">
    <div class="sec-head">
      <span class="sec-title" id="career-title"></span>
      <span class="sec-note" id="career-note"></span>
    </div>
    <div class="ledger" id="career-ledger"></div>
  </div>
</section>

<section id="research">
  <div class="wrap">
    <div class="sec-head">
      <span class="sec-title" id="research-title"></span>
      <span class="sec-note" id="research-note"></span>
    </div>
    <div class="flagship-grid" id="flagship-grid"></div>
    <div class="pub-list" id="pub-list"></div>
  </div>
</section>

<section id="projects">
  <div class="wrap">
    <div class="sec-head">
      <span class="sec-title" id="projects-title"></span>
      <span class="sec-note" id="projects-note"></span>
    </div>
    <div class="filter-bar" id="filter-bar"></div>
    <div class="ledger" id="project-ledger"></div>
  </div>
</section>

<section id="teaching">
  <div class="wrap">
    <div class="sec-head">
      <span class="sec-title" id="teaching-title"></span>
      <span class="sec-note" id="teaching-note"></span>
    </div>
    <div class="teach-grid">
      <div class="teach-col"><h4 id="course-label"></h4><div id="course-list"></div></div>
      <div class="teach-col"><h4 id="invited-label"></h4><div id="invited-list"></div></div>
    </div>
    <div style="margin-top:36px;">
      <span class="eyebrow" id="special-label"></span>
      <p style="font-size:14px; color:var(--slate); max-width:70ch; margin-top:10px;" id="special-note"></p>
      <div class="special-strip" id="special-strip"></div>
    </div>
  </div>
</section>

<section id="gallery" style="display:none;">
  <div class="wrap">
    <div class="sec-head">
      <span class="sec-title" id="gallery-title"></span>
      <span class="sec-note" id="gallery-note"></span>
    </div>
    <div class="gallery-grid" id="gallery-grid"></div>
  </div>
</section>

<footer id="contact">
  <div class="wrap">
    <div class="sec-head"><span class="sec-title" id="contact-title"></span></div>
    <div class="contact-grid">
      <p class="contact-lead" id="contact-lead"></p>
      <div class="contact-links" id="contact-links"></div>
    </div>
    <div class="foot-bottom">
      <span>© 2026 Sumin Hong</span>
      <span id="contact-footnote"></span>
    </div>
  </div>
</footer>

<div class="lightbox" id="lightbox">
  <button class="lb-close" id="lb-close">✕ ESC</button>
  <img id="lb-img" alt="">
  <div class="lb-caption" id="lb-caption"></div>
</div>

<script>
/* Fallback copy of content.json — used only if content.json cannot be fetched
   (e.g. opening this file directly from disk). Keep this in sync manually,
   or simply always serve the folder over http(s) so the live content.json is used. */
const FALLBACK_CONTENT = {"hero": {"eyebrow": {"en": "Instructional Design · Educational Technology", "ko": "교수설계 · 교육공학"}, "nav": [{"href": "#about", "en": "About", "ko": "소개"}, {"href": "#career", "en": "Career", "ko": "경력"}, {"href": "#research", "en": "Research", "ko": "연구"}, {"href": "#projects", "en": "Projects", "ko": "프로젝트"}, {"href": "#teaching", "en": "Teaching", "ko": "교육"}, {"href": "#gallery", "en": "Gallery", "ko": "갤러리"}, {"href": "#contact", "en": "Contact", "ko": "연락처"}], "roleText": {"en": "Educational technology researcher building <strong>AI-integrated instructional design</strong>.", "ko": "<strong>AI 융합 교수설계</strong>를 연구하는 교육공학 연구자입니다."}, "sub": {"en": "Ph.D. in Educational Technology, Seoul National University (2026)", "ko": "교육공학 박사, 서울대학교 (2026)"}, "statusChips": [{"en": "Incoming Assistant Professor — Myongji University (2026.09–)", "ko": "명지대학교 조교수 임용 예정 (2026.09–)", "dot": "violet"}, {"en": "Researcher, Learning Sciences Research Institute, SNU", "ko": "서울대학교 학습과학연구소 연구원", "dot": "cyan"}], "links": [{"label": "shong@mju.ac.kr", "href": "mailto:shong@mju.ac.kr"}, {"label": "ORCID 0000-0003-2276-0505", "href": "https://orcid.org/0000-0003-2276-0505"}, {"label": "ResearchGate", "href": "https://www.researchgate.net/profile/Hong-Sumin"}, {"label": "LinkedIn", "href": "http://www.linkedin.com/in/sumin-hong-72a472201"}, {"label_en": "Full CV (Notion)", "label_ko": "전체 CV (Notion)", "href": "https://suminhong.notion.site"}], "profileImage":""}, "about": {"sectionTitle": {"en": "About", "ko": "소개"}, "lead1": {"en": "I design and study how <strong>artificial intelligence reshapes instruction</strong>.", "ko": "저는 <strong>인공지능이 교수·학습을 어떻게 재구성하는지</strong>를 설계하고 연구합니다."}, "lead2": {"en": "In 2026.09 I join <strong>Myongji University</strong> as Assistant Professor.", "ko": "2026년 9월부터 <strong>명지대학교</strong> 조교수로 부임합니다."}, "interestsLabel": {"en": "Research interests", "ko": "연구 관심사"}, "interests": [{"en": "Instructional design", "ko": "교수설계"}], "facts": [{"k": {"en": "Education", "ko": "학력"}, "v": {"en": "Ph.D. Educational Technology — SNU", "ko": "교육공학 박사 — 서울대학교"}}]}, "career": {"sectionTitle": {"en": "Career", "ko": "경력"}, "sectionNote": {"en":"", "ko":""}, "rows": []}, "research": {"sectionTitle": {"en": "Research", "ko": "연구"}, "sectionNote": {"en":"", "ko":""}, "flagships": [], "publications": []}, "projects": {"sectionTitle": {"en": "Projects", "ko": "프로젝트"}, "sectionNote": {"en":"", "ko":""}, "filters": [{"key":"all","en":"All","ko":"전체"}], "rows": []}, "teaching": {"sectionTitle": {"en": "Teaching", "ko": "교육"}, "sectionNote": {"en":"", "ko":""}, "courseLecturesLabel":{"en":"Course Lectures","ko":"정규 강의"}, "courseLectures": [], "invitedTalksLabel":{"en":"Invited Talks","ko":"초청 강연"}, "invitedTalks": [], "specialLecturesLabel":{"en":"","ko":""}, "specialLecturesNote":"", "specialLectureGallery": []}, "gallery": {"sectionTitle": {"en":"Gallery","ko":"갤러리"}, "sectionNote": {"en":"","ko":""}, "items":[]}, "contact": {"sectionTitle": {"en": "Get in touch", "ko": "연락하기"}, "lead": {"en":"","ko":""}, "links": [], "footNote": {"en":"","ko":""}}};

let DATA = null;
let LANG = 'en';

async function loadData(){
  try{
    const res = await fetch('content.json', {cache:'no-store'});
    if(!res.ok) throw new Error('bad response');
    DATA = await res.json();
  }catch(e){
    DATA = FALLBACK_CONTENT;
    document.getElementById('local-notice').style.display = 'block';
  }
  ensureImageFields(DATA);
  render();
}

// content.json에 새 이미지 필드가 없을 경우 안전한 기본값 채우기 (하위 호환)
function ensureImageFields(d){
  if(!d.hero) d.hero = {};
  if(typeof d.hero.profileImage !== 'string') d.hero.profileImage = '';
  if(d.career && Array.isArray(d.career.rows)){
    d.career.rows.forEach(r => { if(typeof r.logo !== 'string') r.logo = ''; });
  }
  if(d.research && Array.isArray(d.research.flagships)){
    d.research.flagships.forEach(f => { if(typeof f.image !== 'string') f.image = ''; });
  }
  if(d.teaching){
    if(Array.isArray(d.teaching.courseLectures)){
      d.teaching.courseLectures.forEach(c => { if(typeof c.image !== 'string') c.image = ''; });
    }
    if(Array.isArray(d.teaching.invitedTalks)){
      d.teaching.invitedTalks.forEach(c => { if(typeof c.image !== 'string') c.image = ''; });
    }
    if(!Array.isArray(d.teaching.specialLectureGallery)) d.teaching.specialLectureGallery = [];
  }
  if(!d.gallery){
    d.gallery = { sectionTitle:{en:'Gallery',ko:'갤러리'}, sectionNote:{en:'',ko:''}, items:[] };
  }
  if(!Array.isArray(d.gallery.items)) d.gallery.items = [];
}

function tr(field){
  if(field == null) return '';
  if(typeof field === 'string') return field;
  return field[LANG] ?? field.en ?? '';
}

function render(){
  const d = DATA;
  document.getElementById('hero-eyebrow').innerHTML = tr(d.hero.eyebrow);

  // Profile image
  if(d.hero.profileImage){
    document.getElementById('hero-profile').style.display = 'block';
    document.getElementById('hero-profile-img').src = d.hero.profileImage;
  } else {
    document.getElementById('hero-profile').style.display = 'none';
  }

  const nav = document.getElementById('hero-nav');
  nav.querySelectorAll('a').forEach(a=>a.remove());
  // Auto-add gallery nav entry if items exist but not in nav
  let navItems = d.hero.nav.slice();
  const hasGalleryNav = navItems.some(n => n.href === '#gallery');
  if(!hasGalleryNav && d.gallery.items.length > 0){
    // Insert #gallery before #contact
    const contactIdx = navItems.findIndex(n => n.href === '#contact');
    const galleryEntry = {href:'#gallery', en:'Gallery', ko:'갤러리'};
    if(contactIdx >= 0) navItems.splice(contactIdx, 0, galleryEntry);
    else navItems.push(galleryEntry);
  }
  navItems.forEach(item=>{
    const a = document.createElement('a');
    a.href = item.href; a.textContent = tr(item);
    nav.insertBefore(a, nav.firstChild);
  });

  document.getElementById('hero-role').innerHTML = tr(d.hero.roleText);
  document.getElementById('hero-sub').innerHTML = tr(d.hero.sub);

  document.getElementById('hero-status').innerHTML = d.hero.statusChips.map(c=>
    `<span class="status-chip"><span class="dot ${c.dot}"></span>${tr(c)}</span>`
  ).join('');

  document.getElementById('hero-links').innerHTML = d.hero.links.map(l=>{
    const label = l.label ?? (l['label_'+LANG] || l.label_en);
    return `<a href="${l.href}" target="_blank" rel="noopener">${label}</a>`;
  }).join('');

  document.getElementById('about-title').textContent = tr(d.about.sectionTitle);
  document.getElementById('about-lead1').innerHTML = tr(d.about.lead1);
  document.getElementById('about-lead2').innerHTML = tr(d.about.lead2);
  document.getElementById('about-interests-label').textContent = tr(d.about.interestsLabel);
  document.getElementById('about-interests').innerHTML = d.about.interests.map(i=>`<span>${tr(i)}</span>`).join('');
  document.getElementById('about-facts').innerHTML = d.about.facts.map(f=>`
    <div class="fact">
      <div class="k">${tr(f.k)}</div>
      <div class="v">${tr(f.v)}</div>
      ${f.v2 ? `<div class="v" style="color:var(--slate-light); font-size:13.5px;">${tr(f.v2)}</div>` : ''}
    </div>`).join('');

  document.getElementById('career-title').textContent = tr(d.career.sectionTitle);
  document.getElementById('career-note').innerHTML = tr(d.career.sectionNote);
  // Check if any career row has a logo - determines grid layout
  const anyCareerLogo = d.career.rows.some(r => r.logo);
  document.getElementById('career-ledger').innerHTML = d.career.rows.map(r=>{
    const orgHtml = r.org ? `<div class="org">${tr(r.org)}</div>` : '';
    const logoHtml = anyCareerLogo
      ? `<div class="ledger-logo">${r.logo ? `<img src="${r.logo}" alt="">` : ''}</div>`
      : '';
    const rowCls = anyCareerLogo ? '' : 'no-logo';
    return `<div class="ledger-row ${rowCls}">
      ${logoHtml}
      <div class="ledger-date mono">${r.date}</div>
      <div class="ledger-main"><div class="title">${tr(r.title)}</div>${orgHtml}</div>
      <div class="ledger-tags"><span class="pill ${r.pill.type}">${tr(r.pill)}</span></div>
    </div>`;
  }).join('');

  document.getElementById('research-title').textContent = tr(d.research.sectionTitle);
  document.getElementById('research-note').innerHTML = tr(d.research.sectionNote);
  document.getElementById('flagship-grid').innerHTML = d.research.flagships.map(f=>{
    const imageHtml = f.image ? `<div class="flagship-image"><img src="${f.image}" alt=""></div>` : '';
    return `<div class="flagship">
      ${imageHtml}
      <div class="flagship-inner">
        <span class="tag">${tr(f.tag)}</span>
        <h4>${tr(f.title)}</h4>
        <p>${tr(f.desc)}</p>
        <a href="${f.href}" target="_blank" rel="noopener">${f.linkText}</a>
      </div>
    </div>`;
  }).join('');
  document.getElementById('pub-list').innerHTML = d.research.publications.map(p=>`
    <div class="pub">
      <div class="yr mono">${p.year}</div>
      <div class="cite"><span class="authors">${p.authors}</span> — ${p.title} <span class="journal">${p.journal}</span></div>
    </div>`).join('');

  document.getElementById('projects-title').textContent = tr(d.projects.sectionTitle);
  document.getElementById('projects-note').innerHTML = tr(d.projects.sectionNote);
  document.getElementById('filter-bar').innerHTML = d.projects.filters.map((f,i)=>
    `<button class="filter-btn ${i===0?'active':''}" data-filter="${f.key}">${tr(f)}</button>`
  ).join('');
  document.getElementById('project-ledger').innerHTML = d.projects.rows.map(r=>`
    <div class="ledger-row no-logo" data-role="${r.role}" data-status="${r.status}">
      <div class="ledger-date mono">${r.date}</div>
      <div class="ledger-main"><div class="title">${r.title}</div>${r.org ? `<div class="org">${tr(r.org)}</div>`:''}</div>
      <div class="ledger-tags"><span class="pill ${r.pill}">${r.pillLabel}</span>${r.roleLabel ? `<span class="pill role">${r.roleLabel}</span>`:''}</div>
    </div>`).join('');
  bindFilters();

  document.getElementById('teaching-title').innerHTML = tr(d.teaching.sectionTitle);
  document.getElementById('teaching-note').innerHTML = tr(d.teaching.sectionNote);
  document.getElementById('course-label').innerHTML = tr(d.teaching.courseLecturesLabel);
  document.getElementById('course-list').innerHTML = d.teaching.courseLectures.map(c=>{
    const thumb = c.image ? `<div class="teach-thumb"><img src="${c.image}" alt=""></div>` : '';
    const cls = c.image ? '' : 'no-thumb';
    return `<div class="teach-item ${cls}">${thumb}<div class="teach-body"><div class="t-title">${tr(c.title)}</div><div class="t-meta">${tr(c.meta)}</div></div></div>`;
  }).join('');
  document.getElementById('invited-label').innerHTML = tr(d.teaching.invitedTalksLabel);
  document.getElementById('invited-list').innerHTML = d.teaching.invitedTalks.map(c=>{
    const thumb = c.image ? `<div class="teach-thumb"><img src="${c.image}" alt=""></div>` : '';
    const cls = c.image ? '' : 'no-thumb';
    return `<div class="teach-item ${cls}">${thumb}<div class="teach-body"><div class="t-title">${tr(c.title)}</div><div class="t-meta">${tr(c.meta)}</div></div></div>`;
  }).join('');
  document.getElementById('special-label').innerHTML = tr(d.teaching.specialLecturesLabel);
  document.getElementById('special-note').textContent = d.teaching.specialLecturesNote;
  // Special lecture gallery strip
  const specialStrip = document.getElementById('special-strip');
  if(d.teaching.specialLectureGallery.length > 0){
    specialStrip.innerHTML = d.teaching.specialLectureGallery.map(g=>{
      const cap = g.caption ? tr(g.caption) : '';
      return `<figure><img src="${g.image}" alt="" data-lightbox="${escapeAttr(g.image)}" data-caption="${escapeAttr(cap)}">${cap ? `<figcaption>${cap}</figcaption>` : ''}</figure>`;
    }).join('');
    specialStrip.style.display = '';
  } else {
    specialStrip.innerHTML = '';
  }

  // Gallery section
  const gallerySection = document.getElementById('gallery');
  if(d.gallery.items.length > 0){
    gallerySection.style.display = '';
    document.getElementById('gallery-title').textContent = tr(d.gallery.sectionTitle);
    document.getElementById('gallery-note').innerHTML = tr(d.gallery.sectionNote);
    document.getElementById('gallery-grid').innerHTML = d.gallery.items.map(g=>{
      const cap = g.caption ? tr(g.caption) : '';
      return `<figure class="gallery-item" data-lightbox="${escapeAttr(g.image)}" data-caption="${escapeAttr(cap)}">
        <img src="${g.image}" alt="">
        ${cap ? `<figcaption>${cap}</figcaption>` : ''}
      </figure>`;
    }).join('');
  } else {
    gallerySection.style.display = 'none';
  }

  bindLightbox();

  document.getElementById('contact-title').textContent = tr(d.contact.sectionTitle);
  document.getElementById('contact-lead').textContent = tr(d.contact.lead);
  document.getElementById('contact-links').innerHTML = d.contact.links.map(l=>{
    const k = typeof l.k === 'string' ? l.k : tr(l.k);
    return `<a href="${l.href}" target="_blank" rel="noopener"><span>${l.value}</span><span class="k">${k}</span></a>`;
  }).join('');
  document.getElementById('contact-footnote').textContent = tr(d.contact.footNote);

  document.getElementById('lang-toggle').textContent = LANG === 'ko' ? 'English' : '한국어';
  document.getElementById('html-root').setAttribute('lang', LANG);
}

function escapeAttr(s){ return (s+'').replace(/"/g,'&quot;'); }

function bindFilters(){
  const buttons = document.querySelectorAll('.filter-btn');
  const rows = document.querySelectorAll('#project-ledger .ledger-row');
  buttons.forEach(btn=>{
    btn.addEventListener('click', ()=>{
      buttons.forEach(b=>b.classList.remove('active'));
      btn.classList.add('active');
      const f = btn.dataset.filter;
      rows.forEach(r=>{
        if(f==='all'){ r.classList.remove('hidden'); return; }
        r.classList.toggle('hidden', r.dataset.role!==f && r.dataset.status!==f);
      });
    });
  });
}

// Lightbox
function bindLightbox(){
  document.querySelectorAll('[data-lightbox]').forEach(el=>{
    el.addEventListener('click', ()=>{
      const src = el.dataset.lightbox;
      const cap = el.dataset.caption || '';
      document.getElementById('lb-img').src = src;
      document.getElementById('lb-img').alt = cap;
      document.getElementById('lb-caption').textContent = cap;
      document.getElementById('lightbox').classList.add('open');
    });
  });
}
document.getElementById('lightbox').addEventListener('click', (e)=>{
  if(e.target.id === 'lightbox' || e.target.id === 'lb-close'){
    document.getElementById('lightbox').classList.remove('open');
  }
});
document.addEventListener('keydown', (e)=>{
  if(e.key === 'Escape') document.getElementById('lightbox').classList.remove('open');
});

document.addEventListener('click', (e)=>{
  if(e.target && e.target.id === 'lang-toggle'){
    LANG = LANG === 'en' ? 'ko' : 'en';
    render();
  }
});

loadData();
</script>

</body>
</html>
